name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA or ref to publish from"
        required: true
        default: "main"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: >
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Detect release merge
        id: detect_release
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(python3 - <<'PY'
          import json

          with open('npm/package.json', encoding='utf-8') as file:
              print(json.load(file)['version'])
          PY
          )"
          TAG="v${VERSION}"
          PARENT_COUNT="$(git rev-list --parents -n 1 HEAD | awk '{print NF - 1}')"

          if [ "${PARENT_COUNT}" -gt 1 ]; then
            RANGE="HEAD^1..HEAD"
          else
            RANGE="HEAD^..HEAD"
          fi

          if git diff --quiet HEAD^ HEAD -- CHANGELOG.md npm/package.json; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SUBJECTS="$(git log --format=%s "${RANGE}")"
          if ! TAG="${TAG}" SUBJECTS="${SUBJECTS}" node --input-type=module <<'EOF'
          const tag = process.env.TAG;
          const subjects = (process.env.SUBJECTS ?? "").split("\n").filter(Boolean);
          const escapedTag = tag.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const pattern = new RegExp(`^release: ${escapedTag}( \\(#\\d+\\))?$`);

          process.exit(subjects.some((subject) => pattern.test(subject)) ? 0 : 1);
          EOF
          then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "should_release=true"
            echo "version=${VERSION}"
            echo "tag=${TAG}"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        if: steps.detect_release.outputs.should_release == 'true'
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v6
        if: steps.detect_release.outputs.should_release == 'true'
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        if: steps.detect_release.outputs.should_release == 'true'

      - name: Initialize submodules
        if: steps.detect_release.outputs.should_release == 'true'
        run: git submodule update --init --recursive

      - name: Install dependencies
        if: steps.detect_release.outputs.should_release == 'true'
        run: bun install --frozen-lockfile

      - name: Build package
        if: steps.detect_release.outputs.should_release == 'true'
        run: bun run build

      - name: Publish to npm
        if: steps.detect_release.outputs.should_release == 'true'
        run: |
          cd npm
          npm publish --provenance --access public

      - name: Extract release notes
        if: steps.detect_release.outputs.should_release == 'true'
        env:
          VERSION: ${{ steps.detect_release.outputs.version }}
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from "node:fs";
          import { extractReleaseNotes } from "./scripts/release-lib.mjs";

          const changelog = readFileSync("CHANGELOG.md", "utf8");
          const version = process.env.VERSION;
          const notes = extractReleaseNotes(changelog, version);
          writeFileSync("release-notes.md", `${notes}\n`);
          EOF

      - name: Create git tag
        if: steps.detect_release.outputs.should_release == 'true'
        env:
          TAG: ${{ steps.detect_release.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release
        if: steps.detect_release.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.detect_release.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file release-notes.md \
            --verify-tag
